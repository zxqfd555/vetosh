# Self-contained benchmark: Qdrant + vetosh indexer + vetosh server.
#
# Parametrized by env vars:
#   BENCH_SIZE         dataset folder under ./datasets (default 100mb)
#   BENCH_SERVER_PORT  host port for the vetosh server API (default 8300)
#   BENCH_QDRANT_PORT  host port for Qdrant REST (readiness probes, default 8301)
#
# NOTE (dev setup): until a Pathway release ships the qdrant connector, the
# vetosh containers run against a pathway source tree + a prebuilt engine
# (mounted read-only, paths below). The published version of this benchmark
# will replace the mounts with `pip install vetosh[qdrant,local]`.

x-vetosh: &vetosh
  image: python:3.12-slim
  working_dir: /home/sergey/vetosh
  environment: &vetosh-env
    PYTHONPATH: "/opt/pathway-src/python:/home/sergey/vetosh:/home/sergey/vetosh/.venv312/lib/python3.12/site-packages:/home/sergey/vetosh/.venv312/lib64/python3.12/site-packages"
    PATHWAY_LICENSE_KEY: ${PATHWAY_LICENSE_KEY:-}
    HF_HOME: /hf-cache
    # Model cache is pre-warmed by run_bench on the host; containers never
    # touch the network (8 workers probing HF concurrently hit rate limits).
    HF_HUB_OFFLINE: "1"
    # The dev-built engine links libs from the pixi toolchain (libpq, libssl…)
    # and -ffast-math symbols glibc dropped (see compat/finite_shim.c).
    LD_LIBRARY_PATH: /opt/pixi-lib
    LD_PRELOAD: /opt/compat/finite_shim.so
    # Hard guarantee that nothing can spend OpenAI quota.
    OPENAI_API_KEY: x
    # Allocator experiment knobs (empty = library defaults).
    _RJEM_MALLOC_CONF: ${BENCH_JEMALLOC_CONF:-}
    MALLOC_ARENA_MAX: ${BENCH_MALLOC_ARENA_MAX:-}
  volumes:
    - /home/sergey/vetosh:/home/sergey/vetosh:ro
    # Local-disk copy of the venv overlaid on the same path: keeps NFS out of
    # the containers' hot path (torch import reads GBs; NFS hiccups froze
    # runs in D-state). Refresh with rsync after pip installs.
    - /mnt/scratch/sergey/vetosh-venv312:/home/sergey/vetosh/.venv312:ro
    - /mnt/scratch/sergey/iot-pathway-develop-wt/public/pathway/python:/opt/pathway-src/python:ro
    - /mnt/scratch/sergey/pixi/IoT-Pathway-18069838481262607842/envs/default/lib:/opt/pixi-lib:ro
    - ./compat:/opt/compat:ro
    - /mnt/scratch/sergey/hf-cache:/hf-cache:ro
    - ${BENCH_DATA_ROOT:-./datasets}/${BENCH_SIZE:-100mb}/docs:/data/docs:ro
    - ./config.yaml:/bench/config.yaml:ro

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:${BENCH_QDRANT_PORT:-8301}:6333"

  indexer:
    <<: *vetosh
    # Worker processes come from `indexer.workers` in config.yaml (the
    # entrypoint re-executes itself through `pathway spawn --processes N`).
    command: ["python", "-m", "vetosh.cli", "indexer", "--config", "/bench/config.yaml"]
    environment:
      <<: *vetosh-env
      # torch threads PER WORKER; without this each worker grabs all cores
      # and 8 workers thrash (cores / workers is a good default).
      OMP_NUM_THREADS: ${BENCH_OMP_THREADS:-12}
    depends_on:
      - qdrant

  server:
    <<: *vetosh
    command: ["python", "-m", "vetosh.cli", "server", "--config", "/bench/config.yaml"]
    ports:
      - "127.0.0.1:${BENCH_SERVER_PORT:-8300}:8000"
    depends_on:
      - qdrant
